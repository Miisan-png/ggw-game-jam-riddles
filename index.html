<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Great Game Week Quest Book Riddles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sky"></div>
  <div class="sand"></div>

  <header class="hero">
    <div class="sign">
      <span class="sign-clock">🕒</span>
      <h1 class="sign-title">Great Game Week<br /><span class="sign-title-big">Quest Book Riddles</span></h1>
    </div>
    <div class="hero-tags">
      <span class="tag tag-date">7&ndash;9 July 2026</span>
      <span class="tag tag-place">APU Campus &middot; Level 3</span>
    </div>
    <p class="hero-sub">Solve the riddles given by the <b>GGW</b> booth and collect extra stamps!</p>
  </header>

  <main class="board" id="board"></main>

  <footer class="footer">
    <p>A new riddle unlocks each day of the festival. Come back daily!</p>
    <div class="footer-logos">🌿 🐾 🎲 🎮</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
